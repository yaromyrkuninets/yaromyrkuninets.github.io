<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
</head>
<style>
    * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
    }

    body {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        display: flex;
        width: 70%;
        justify-content: space-between;
    }

    a {
        text-decoration: none;
        color: black;
        font-family: Arial, Helvetica, sans-serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 34px;
        transition: all .7s ease;
    }

    .portfolio:hover {
        color: red;
    }

    .uber:hover {
        color: rgb(0, 212, 212);
    }

    .pulse:hover {
        color: rgb(127, 20, 214);
    }

    .trevland:hover {
        color: green;
    }
    @media screen and (max-width: 860px) {
        .container {
        display: flex;
        flex-direction: column;
        width: 70%;
        height: 200px;
        align-items: center;
        justify-content: space-between;
        }
    }
</style>

<body>
    <div class="container">
        <a class="pulse" href="Pulse/index.html">Pulse</a>
        <a class="uber" href="Uber/index.html">Uber</a>
        <a class="portfolio" href="Portfolio/index.html">Grid Layout</a>
        <a class="trevland" href="Trevlend/index.html">Trevland</a>
    </div>
</body>

</html>
